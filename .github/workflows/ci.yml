name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: tndb
          POSTGRES_PASSWORD: tndb
          POSTGRES_DB: tndb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r backend/requirements.txt

      - run: cd backend && pytest
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://tndb:tndb@localhost:5432/tndb_test

  frontend-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npx vue-tsc --noEmit
        working-directory: frontend

      - run: npx vitest run
        working-directory: frontend

      - run: npx vite build
        working-directory: frontend

  docker-build:
    needs: [backend-tests, frontend-check]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t tndb-backend:latest -f docker/Dockerfile.backend .

      - name: Build frontend image
        run: docker build -t tndb-frontend:latest -f docker/Dockerfile.frontend .
