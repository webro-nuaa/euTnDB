# Production overrides
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  frontend:
    restart: always

  backend:
    restart: always
    deploy:
      replicas: 2

  worker:
    restart: always
    deploy:
      replicas: 2

  db:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2g

  redis:
    restart: always

  backup:
    restart: always
