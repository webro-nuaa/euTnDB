services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - tndb-network
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    expose:
      - "8000"
    env_file:
      - .env.docker
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data
    networks:
      - tndb-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env.docker
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data
    networks:
      - tndb-network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tndb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tndb}
      POSTGRES_DB: ${POSTGRES_DB:-tndb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - tndb-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tndb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - tndb-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backup:
    image: postgres:15-alpine
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          sleep $((3600 * 6))
          PGPASSWORD=${POSTGRES_PASSWORD} pg_dump -h db -U ${POSTGRES_USER} ${POSTGRES_DB} \
            | gzip > /backups/tndb_$(date +%Y%m%d_%H%M%S).sql.gz
          ls -1t /backups/*.gz | tail -n +15 | xargs rm -f 2>/dev/null || true
        done
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tndb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tndb}
      POSTGRES_DB: ${POSTGRES_DB:-tndb}
    volumes:
      - backup_data:/backups
    networks:
      - tndb-network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  app_data:
  backup_data:

networks:
  tndb-network:
    driver: bridge
